// 曜日: localStorage では 1〜5 (1=月..5=金) / GAS payload では mon/tue/wed/thu/fri
const TUTUGA_DAY_NUM_TO_KEY = { 1: "mon", 2: "tue", 3: "wed", 4: "thu", 5: "fri" };
const TUTUGA_DAY_KEY_TO_NUM = { mon: 1, tue: 2, wed: 3, thu: 4, fri: 5 };

// 値が空 (null/undefined/'') かどうか。0 や false は有効値。
function _tutugaIsEmptyValue(v) {
  return v === null || v === undefined || v === '';
}

// 共通: 一度の POST を送って JSON を返す。401 / authRequired を一括処理。
async function _tutugaPost(body, timeoutMs) {
  const res = await fetchWithTimeout(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(withTokenBody(body))
  }, timeoutMs || 30000);
  const data = await res.json();
  if (data && data.authRequired) {
    handleAuthFailure();
    throw new Error('認証が切れました');
  }
  if (data && data.error) {
    throw new Error(data.error);
  }
  return data;
}

// tutugaData.weeks[w][d=1..5][key]  (per-day cells) を、
// Code.gs saveWaterUsage が期待する per-week per-fieldKey per-dayKey 形式へ変換。
//   { [week]: { [fieldKey]: { mon, tue, wed, thu, fri, nextMon } } }
// nextMon は週 w+1 の月曜セル (tutugaData.weeks[w+1][1]) から拾う。
// 横展開② B2: stripHoliday=true (保存経路) のとき、祝日の累積メーター(返送1/2・放流)を
// payload から除外する。export 経路 (stripHoliday 省略=false) は B1 が出力空欄を担保するため
// 二重 strip しない（共用ビルダーを壊さない）。
function _tutugaBuildWaterUsagePayload(stripHoliday) {
  const usageKeys = (TUTUGA_FIELDS && TUTUGA_FIELDS.water)
    ? TUTUGA_FIELDS.water.usage.concat(TUTUGA_FIELDS.water.usageFormExtras)
    : [];
  const out = {};
  for (let w = 1; w <= 5; w++) {
    const week = tutugaData.weeks && tutugaData.weeks[w];
    if (!week) continue;
    const weekOut = {};
    let hasAny = false;
    usageKeys.forEach(function(key) {
      const isBlankKey = TUTUGA_HOLIDAY_BLANK_KEYS_WATER.indexOf(key) >= 0;
      const dayObj = {};
      let keyHas = false;
      for (let d = 1; d <= 5; d++) {
        const dk = TUTUGA_DAY_NUM_TO_KEY[d];
        const cell = week[d];
        const v = cell ? cell[key] : null;
        if (!_tutugaIsEmptyValue(v)) {
          if (stripHoliday && isBlankKey && _tutugaIsHolidayWD(w, d)) continue; // 祝日: 累積を保存除外
          dayObj[dk] = v;
          keyHas = true;
        }
      }
      // nextMon: 翌週月曜セル (Phase 5b では入力 UI なし → 同セルの値を流用)
      const nextWeek = tutugaData.weeks && tutugaData.weeks[w + 1];
      const nextMonCell = nextWeek ? nextWeek[1] : null;
      const nextMonV = nextMonCell ? nextMonCell[key] : null;
      if (!_tutugaIsEmptyValue(nextMonV)) {
        dayObj.nextMon = nextMonV;
        keyHas = true;
      }
      if (keyHas) {
        weekOut[key] = dayObj;
        hasAny = true;
      }
    });
    if (hasAny) out[w] = weekOut;
  }
  return out;
}

// tutugaData.weeks[w][d=1..5][key] (per-day cells) → waterMeasure payload:
//   { [week]: { mon: { fieldKey: value, ... }, tue: {...}, ... } }
// 上段 (usage) と下段 (measure) は同じ cell に格納されているため、measure キーのみフィルタ。
function _tutugaBuildWaterMeasurePayload() {
  const measureKeys = (TUTUGA_FIELDS && TUTUGA_FIELDS.water)
    ? TUTUGA_FIELDS.water.measureFormFull.slice()
    : [];
  const out = {};
  for (let w = 1; w <= 5; w++) {
    const week = tutugaData.weeks && tutugaData.weeks[w];
    if (!week) continue;
    const weekOut = {};
    let weekHas = false;
    for (let d = 1; d <= 5; d++) {
      const dk = TUTUGA_DAY_NUM_TO_KEY[d];
      const cell = week[d];
      if (!cell) continue;
      const dayOut = {};
      let dayHas = false;
      measureKeys.forEach(function(key) {
        // Phase 18-b: 送信前に bikou を sanitize（ISO タイムスタンプの再循環を断つ）
        let v = cell[key];
        if (key === 'bikou') v = sanitizeBikou(v);
        if (!_tutugaIsEmptyValue(v)) {
          dayOut[key] = v;
          dayHas = true;
        }
      });
      if (dayHas) {
        weekOut[dk] = dayOut;
        weekHas = true;
      }
    }
    if (weekHas) out[w] = weekOut;
  }
  return out;
}

// tutugaData.equip[w][equipKey][dayKey] → そのまま saveEquipment が期待する形式
function _tutugaBuildEquipmentPayload() {
  const out = {};
  const eq = tutugaData.equip || {};
  Object.keys(eq).forEach(function(wRaw) {
    const w = parseInt(wRaw, 10);
    if (!w) return;
    const week = eq[wRaw];
    if (!week) return;
    const weekOut = {};
    let weekHas = false;
    Object.keys(week).forEach(function(key) {
      const perDay = week[key];
      if (!perDay || typeof perDay !== 'object') return;
      const dayOut = {};
      let keyHas = false;
      Object.keys(perDay).forEach(function(dk) {
        const v = perDay[dk];
        if (!_tutugaIsEmptyValue(v)) {
          dayOut[dk] = v;
          keyHas = true;
        }
      });
      if (keyHas) { weekOut[key] = dayOut; weekHas = true; }
    });
    if (weekHas) out[w] = weekOut;
  });
  return out;
}

// tutugaData.{mech|elec}[w].days[dk][key] / tutugaData.{mech|elec}[w][d=1..5][key] →
//   { [week]: { mon: {fieldKey: value, ...}, tue: {...}, ... } }
function _tutugaBuildPerDayPayload(src) {
  const out = {};
  if (!src) return out;
  Object.keys(src).forEach(function(wRaw) {
    const w = parseInt(wRaw, 10);
    if (!w) return;
    const week = src[wRaw];
    if (!week) return;
    const weekOut = {};
    let weekHas = false;
    // 新形式: week.days[dk][key]
    if (week.days && typeof week.days === 'object') {
      Object.keys(week.days).forEach(function(dk) {
        if (!(dk in TUTUGA_DAY_KEY_TO_NUM)) return;
        const dayObj = week.days[dk];
        if (!dayObj || typeof dayObj !== 'object') return;
        const dayOut = {};
        let dayHas = false;
        Object.keys(dayObj).forEach(function(key) {
          const v = dayObj[key];
          if (!_tutugaIsEmptyValue(v)) { dayOut[key] = v; dayHas = true; }
        });
        if (dayHas) { weekOut[dk] = dayOut; weekHas = true; }
      });
    }
    // 旧形式: week[d=1..5][key]
    for (let d = 1; d <= 5; d++) {
      const dk = TUTUGA_DAY_NUM_TO_KEY[d];
      const dayObj = week[d];
      if (!dayObj || typeof dayObj !== 'object') continue;
      if (weekOut[dk]) continue; // 新形式が優先
      const dayOut = {};
      let dayHas = false;
      Object.keys(dayObj).forEach(function(key) {
        const v = dayObj[key];
        if (!_tutugaIsEmptyValue(v)) { dayOut[key] = v; dayHas = true; }
      });
      if (dayHas) { weekOut[dk] = dayOut; weekHas = true; }
    }
    if (weekHas) out[w] = weekOut;
  });
  return out;
}

// 全タブ全週を一括で送信。Promise.allSettled で並列実行し、エラーは集約して返す。
async function uploadAllTabs() {
  const month = tutugaData.targetMonth;
  if (!month) throw new Error('対象年月が未設定です');

  const results = { saved: 0, scopes: [] };
  const tasks = [];

  const waterUsage = _tutugaBuildWaterUsagePayload(true); // 横展開② B2: 保存時のみ祝日の累積メーターを strip
  if (Object.keys(waterUsage).length > 0) {
    tasks.push({ scope: '水質上段', body: { action: 'saveWaterUsage', month: month, weeks: waterUsage } });
  }

  const waterMeasure = _tutugaBuildWaterMeasurePayload();
  if (Object.keys(waterMeasure).length > 0) {
    // Phase A: 週ごとの分割リクエストを廃止し、全週を 1 リクエストにまとめる
    // (GAS 側 saveWaterMeasure が weeks payload を索引1回読み + batched 書込で処理)。
    tasks.push({ scope: '水質下段', body: { action: 'saveWaterMeasure', month: month, weeks: waterMeasure } });
  }

  const equipment = _tutugaBuildEquipmentPayload();
  if (Object.keys(equipment).length > 0) {
    tasks.push({ scope: '機器運転時間', body: { action: 'saveEquipment', month: month, equipment: equipment } });
  }

  const electrical = _tutugaBuildElectricalPayload();
  if (Object.keys(electrical).length > 0) {
    tasks.push({ scope: '電気設備', body: { action: 'saveElectrical', month: month, electrical: electrical } });
  }

  const mechanical = _tutugaBuildMechanicalPayload();
  if (Object.keys(mechanical).length > 0) {
    tasks.push({ scope: '機械設備', body: { action: 'saveMechanical', month: month, mechanical: mechanical } });
  }

  if (tasks.length === 0) return results;

  const settled = await Promise.allSettled(
    tasks.map(function(t) { return _tutugaPost(t.body, 45000); })
  );

  const errors = [];
  settled.forEach(function(r, i) {
    const scope = tasks[i].scope;
    if (r.status === 'fulfilled') {
      results.saved += (r.value && (r.value.savedCount || r.value.savedWeeks || 0)) || 0;
      results.scopes.push(scope);
    } else {
      const reason = r.reason;
      const msg = (reason && reason.message) || String(reason) || 'unknown';
      errors.push(scope + ': ' + msg);
    }
  });

  if (errors.length > 0) {
    const successText = results.scopes.length > 0
      ? '保存成功(' + results.scopes.join('・') + ') / '
      : '';
    const err = new Error(successText + '失敗(' + errors.join(', ') + ')');
    err.partialResults = results;
    throw err;
  }
  return results;
}

// サーバから getAllData を取得。
async function downloadFromServer(month) {
  const url = withToken(GAS_URL + '?action=getAllData&month=' + encodeURIComponent(month));
  const res = await fetchWithTimeout(url, { method: 'GET' }, 30000);
  const data = await res.json();
  if (data && data.authRequired) {
    handleAuthFailure();
    throw new Error('認証が切れました');
  }
  if (data && data.error) throw new Error(data.error);
  return data;
}

// Code.gs getAllData の応答 ({month, waterUsage, waterMeasure, equipment, electrical, mechanical, holidays})
// を tutugaData にマージする。tutugaData の構造保持のため上書きではなく per-cell マージ。
function mergeServerData(serverData, expectedMonth) {
  const summary = {
    waterUsage_weeks: 0,
    waterMeasure_days: 0,
    equipment_weeks: 0,
    electrical_days: 0,
    mechanical_days: 0,
    holidays: 0
  };
  if (!serverData || typeof serverData !== 'object') return summary;

  // Phase 38-b5+ Step 1: hardcoded → 動的化 (window.NULL_SKIP_KEYS_DIRECT 参照、fallback 付き)
  var _NULL_SKIP_KEYS = (window.NULL_SKIP_KEYS_DIRECT && window.NULL_SKIP_KEYS_DIRECT.length)
    ? window.NULL_SKIP_KEYS_DIRECT
    : ['tempFinal1', 'tempFinal2', 'transFinal1', 'transFinal2', 'phFinal1', 'phFinal2'];  // fallback (Phase 23-B-3 原型 6 keys)

  // Phase 14: 月キー流入防止 / Phase 19-E': 比較は両辺 YYYY-MM 正規化で寛容化
  // (1) 同期開始時の対象月と現在の対象月が違う(同期中にユーザーが月切替) → abort
  if (expectedMonth && normalizeMonthValue(expectedMonth) !== normalizeMonthValue(tutugaData.targetMonth)) {
    console.debug('[Sync] Target month changed during sync (expected=' + expectedMonth + ', current=' + tutugaData.targetMonth + '). Aborting merge.');
    return summary;
  }
  // (2) GAS は serverData.month を返している → 対象月と一致しない場合 abort
  const responseMonth = serverData.month || serverData.targetMonth || null;
  if (responseMonth && normalizeMonthValue(responseMonth) !== normalizeMonthValue(tutugaData.targetMonth)) {
    console.debug('[Sync] Month mismatch (targetMonth=' + tutugaData.targetMonth + ', response.month=' + responseMonth + '). Aborting merge.');
    return summary;
  }

  // 水質: usage と measure は同じ tutugaData.weeks[w][d] セルにマージ
  if (!tutugaData.weeks || typeof tutugaData.weeks !== 'object') tutugaData.weeks = {};

  // waterUsage[w][fieldKey][dayKey] → tutugaData.weeks[w][d][fieldKey]
  if (serverData.waterUsage && typeof serverData.waterUsage === 'object') {
    Object.keys(serverData.waterUsage).forEach(function(wRaw) {
      const w = parseInt(wRaw, 10);
      if (!w || w < 1 || w > 5) return;
      const weekIn = serverData.waterUsage[wRaw];
      if (!weekIn) return;
      if (!tutugaData.weeks[w]) tutugaData.weeks[w] = {};
      Object.keys(weekIn).forEach(function(fieldKey) {
        // Phase 18-b: 予約フィールドは skip
        if (fieldKey === 'week' || fieldKey === 'day' || fieldKey === 'updatedAt') return;
        const perDay = weekIn[fieldKey];
        if (!perDay || typeof perDay !== 'object') return;
        Object.keys(perDay).forEach(function(dk) {
          const dNum = TUTUGA_DAY_KEY_TO_NUM[dk];
          if (!dNum) return; // nextMon は別週月曜から推定するため、ここでは無視
          if (!tutugaData.weeks[w][dNum] || typeof tutugaData.weeks[w][dNum] !== 'object') {
            tutugaData.weeks[w][dNum] = {};
          }
          // Phase 18-b: bikou は ISO タイムスタンプならスキップ
          if (fieldKey === 'bikou' && isISOTimestamp(perDay[dk])) return;
          tutugaData.weeks[w][dNum][fieldKey] = perDay[dk];
        });
      });
      summary.waterUsage_weeks++;
    });
  }

  // waterMeasure[w][dayKey][fieldKey] → tutugaData.weeks[w][d][fieldKey]
  if (serverData.waterMeasure && typeof serverData.waterMeasure === 'object') {
    Object.keys(serverData.waterMeasure).forEach(function(wRaw) {
      const w = parseInt(wRaw, 10);
      if (!w || w < 1 || w > 5) return;
      const weekIn = serverData.waterMeasure[wRaw];
      if (!weekIn) return;
      if (!tutugaData.weeks[w]) tutugaData.weeks[w] = {};
      Object.keys(weekIn).forEach(function(dk) {
        const dNum = TUTUGA_DAY_KEY_TO_NUM[dk];
        if (!dNum) return;
        const dayIn = weekIn[dk];
        if (!dayIn || typeof dayIn !== 'object') return;
        if (!tutugaData.weeks[w][dNum] || typeof tutugaData.weeks[w][dNum] !== 'object') {
          tutugaData.weeks[w][dNum] = {};
        }
        Object.keys(dayIn).forEach(function(fieldKey) {
          // Phase 18-b: 予約フィールドは skip
          if (fieldKey === 'week' || fieldKey === 'day' || fieldKey === 'updatedAt') return;
          // Phase 18-b / 19-B: bikou・phFinal は ISO タイムスタンプならスキップ
          if ((fieldKey === 'bikou' || fieldKey === 'phFinal1' || fieldKey === 'phFinal2') && isISOTimestamp(dayIn[fieldKey])) return;
          // Phase 23-B-3 (kamitono fe178b9 / kake 1a89628 横展開):
          // 終沈6キー (1系/2系) は水質管理報告タブの直書き専用フィールドで
          // 日次タブに対応行が無いため、サーバから null/空が返ると
          // ローカル正値が消失する。サーバー値が空ならローカルを保持する防御
          if (_NULL_SKIP_KEYS.indexOf(fieldKey) >= 0 &&
              (dayIn[fieldKey] === null || dayIn[fieldKey] === undefined || dayIn[fieldKey] === '')) return;
          tutugaData.weeks[w][dNum][fieldKey] = dayIn[fieldKey];
        });
        summary.waterMeasure_days++;
      });
    });
  }

  // equipment[w][equipKey][dayKey] → tutugaData.equip[w][equipKey][dayKey]
  if (serverData.equipment && typeof serverData.equipment === 'object') {
    if (!tutugaData.equip || typeof tutugaData.equip !== 'object') tutugaData.equip = {};
    Object.keys(serverData.equipment).forEach(function(wRaw) {
      const w = parseInt(wRaw, 10);
      if (!w || w < 1 || w > 5) return;
      const weekIn = serverData.equipment[wRaw];
      if (!weekIn) return;
      if (!tutugaData.equip[w] || typeof tutugaData.equip[w] !== 'object') tutugaData.equip[w] = {};
      Object.keys(weekIn).forEach(function(rawKey) {
        const perDay = weekIn[rawKey];
        if (!perDay || typeof perDay !== 'object') return;
        // 手順1: 機器名解決（完全一致 → 正規化一致）。解決不可は生キーのまま取り込み（データ消失防止）、
        //        整合スキャン(b) ラベル未マッピングが後段で検出する。
        const equipKey = (typeof _resolveEquipKey === 'function' ? _resolveEquipKey(rawKey) : null) || rawKey;
        if (!tutugaData.equip[w][equipKey] || typeof tutugaData.equip[w][equipKey] !== 'object') {
          tutugaData.equip[w][equipKey] = {};
        }
        Object.keys(perDay).forEach(function(dk) {
          tutugaData.equip[w][equipKey][dk] = perDay[dk];
        });
      });
      summary.equipment_weeks++;
    });
  }

  // electrical[w][dayKey][fieldKey] → tutugaData.elec[w].days[dayKey][fieldKey]
  if (serverData.electrical && typeof serverData.electrical === 'object') {
    if (!tutugaData.elec || typeof tutugaData.elec !== 'object') tutugaData.elec = {};
    Object.keys(serverData.electrical).forEach(function(wRaw) {
      const w = parseInt(wRaw, 10);
      if (!w || w < 1 || w > 5) return;
      const weekIn = serverData.electrical[wRaw];
      if (!weekIn) return;
      if (!tutugaData.elec[w] || typeof tutugaData.elec[w] !== 'object') tutugaData.elec[w] = {};
      if (!tutugaData.elec[w].days || typeof tutugaData.elec[w].days !== 'object') tutugaData.elec[w].days = {};
      Object.keys(weekIn).forEach(function(dk) {
        if (!(dk in TUTUGA_DAY_KEY_TO_NUM)) return;
        const dayIn = weekIn[dk];
        if (!dayIn || typeof dayIn !== 'object') return;
        if (!tutugaData.elec[w].days[dk] || typeof tutugaData.elec[w].days[dk] !== 'object') {
          tutugaData.elec[w].days[dk] = {};
        }
        Object.keys(dayIn).forEach(function(fieldKey) {
          tutugaData.elec[w].days[dk][fieldKey] = dayIn[fieldKey];
        });
        summary.electrical_days++;
      });
    });
  }

  // mechanical[w][dayKey][fieldKey] → tutugaData.mech[w].days[dayKey][fieldKey]
  if (serverData.mechanical && typeof serverData.mechanical === 'object') {
    if (!tutugaData.mech || typeof tutugaData.mech !== 'object') tutugaData.mech = {};
    Object.keys(serverData.mechanical).forEach(function(wRaw) {
      const w = parseInt(wRaw, 10);
      if (!w || w < 1 || w > 5) return;
      const weekIn = serverData.mechanical[wRaw];
      if (!weekIn) return;
      if (!tutugaData.mech[w] || typeof tutugaData.mech[w] !== 'object') tutugaData.mech[w] = {};
      if (!tutugaData.mech[w].days || typeof tutugaData.mech[w].days !== 'object') tutugaData.mech[w].days = {};
      Object.keys(weekIn).forEach(function(dk) {
        if (!(dk in TUTUGA_DAY_KEY_TO_NUM)) return;
        const dayIn = weekIn[dk];
        if (!dayIn || typeof dayIn !== 'object') return;
        if (!tutugaData.mech[w].days[dk] || typeof tutugaData.mech[w].days[dk] !== 'object') {
          tutugaData.mech[w].days[dk] = {};
        }
        Object.keys(dayIn).forEach(function(fieldKey) {
          tutugaData.mech[w].days[dk][fieldKey] = dayIn[fieldKey];
        });
        summary.mechanical_days++;
      });
    });
  }

  // 祝日 (情報のみ; UI 用 COMPANY_HOLIDAYS は別管理)
  if (Array.isArray(serverData.holidays)) summary.holidays = serverData.holidays.length;

  return summary;
}

// 同期ボタン: サーバーから最新データをダウンロードして反映
async function syncAll() {
  const btn = document.getElementById('btnSync');

  // 未保存データがある場合は警告
  if (typeof isDirty !== 'undefined' && isDirty) {
    const ok = confirm(
      '未保存のデータがあります。\n\n' +
      'クラウドから取得すると、サーバーのデータで画面が上書きされ、未保存分は失われる可能性があります。\n\n' +
      '続行しますか？\n\n' +
      '（中止 → 先に「クラウドへ保存」ボタンを押してから「取得」してください）'
    );
    if (!ok) return false;
  }

  if (btn) {
    btn.disabled = true;
    btn.classList.remove('synced', 'error');
    btn.querySelector('.header-btn-label').textContent = '取得中...';
  }

  try {
    // 現在のフォーム入力をローカルに確定（未確定入力の保護）
    saveToStorage();

    const month = tutugaData.targetMonth;
    if (!month) throw new Error('対象年月が未設定です');

    // Phase 14: 同期開始時の対象月をローカルに固定（同期中にユーザーが月切替しても保護）
    const requestedMonth = month;

    // サーバーからダウンロードしてマージ
    const serverData = await downloadFromServer(requestedMonth);
    const summary = mergeServerData(serverData, requestedMonth);
    saveToStorage();

    // 画面再描画
    // B-6: 全タブを再描画して、サーバー新データを確実に反映
    syncMonthInspectorFromDays(); // 測定者UI横展開: 同期後の代表値を月単位欄へ反映（renderForm 前）
    if (typeof renderAll === 'function') renderAll();
    else if (typeof loadDataToForm === 'function') loadDataToForm();

    if (btn) {
      btn.querySelector('.header-btn-label').textContent = '取得済';
      btn.classList.add('synced');
      setTimeout(() => {
        btn.querySelector('.header-btn-label').textContent = '取得';
        btn.classList.remove('synced');
        btn.disabled = false;
      }, 2000);
    }
    setConnectionStatus(true);

    // 取得内容の詳細トースト
    const parts = [];
    if (summary.waterUsage_weeks > 0)   parts.push('水質上段' + summary.waterUsage_weeks + '週');
    if (summary.waterMeasure_days > 0)  parts.push('水質下段' + summary.waterMeasure_days + '日');
    if (summary.equipment_weeks > 0)    parts.push('機器運転時間' + summary.equipment_weeks + '週');
    if (summary.electrical_days > 0)    parts.push('電気設備' + summary.electrical_days + '日');
    if (summary.mechanical_days > 0)    parts.push('機械設備' + summary.mechanical_days + '日');
    const detail = parts.length > 0 ? '（' + parts.join('、') + 'を更新）' : '（更新なし）';
    showToast('サーバーから最新データを取得しました' + detail);

    // B-6: 保存履歴に記録（同期）
    recordSaveLog('同期', parts, 'success', '');

    return true;
  } catch (e) {
    console.error('sync error:', e);
    // ネットワーク起因のエラー時のみオフライン表示
    if (isNetworkError(e)) setConnectionStatus(false);
    if (btn) {
      btn.querySelector('.header-btn-label').textContent = 'エラー';
      btn.classList.add('error');
      setTimeout(() => {
        btn.querySelector('.header-btn-label').textContent = '取得';
        btn.classList.remove('error');
        btn.disabled = false;
      }, 3000);
    }
    showToast('同期エラー: ' + (e.message || e), 'error');
    // B-6: 保存履歴に記録（同期エラー）
    recordSaveLog('同期', [], 'error', e.message || String(e));
    return false;
  }
}

// ===== 強制更新（キャッシュクリア + リロード）=====
async function forceRefresh() {
  const btn = document.getElementById('btnForceRefresh');

  // 未保存データがある場合は強めの警告ダイアログで確認
  if (typeof isDirty !== 'undefined' && isDirty) {
    const okUnsaved = confirm(
      '⚠️ 未保存のデータがあります ⚠️\n\n' +
      'このまま更新すると、未保存の入力内容は失われます。\n\n' +
      '・未保存分を保存してから更新する場合は「キャンセル」\n' +
      '・未保存分を破棄して更新する場合は「OK」\n\n' +
      '本当に更新しますか？'
    );
    if (!okUnsaved) return;
  } else {
    // 未保存なしの場合は通常の確認ダイアログ
    const ok = confirm(
      'アプリを最新版に更新します。\n\n' +
      '・画面が一度真っ白になります\n' +
      '・通信が発生します(Wi-Fi環境推奨)\n' +
      '・ローカル保存データ(入力済みデータ)は消えません\n\n' +
      '続行しますか？'
    );
    if (!ok) return;
  }

  if (btn) {
    btn.classList.add('refreshing');
    btn.querySelector('.header-btn-label').textContent = '更新中...';
    btn.disabled = true;
  }

  try {
    // 1. Service Worker の全キャッシュを削除
    if ('caches' in window) {
      const cacheNames = await caches.keys();
      await Promise.all(cacheNames.map(name => caches.delete(name)));
      console.log('[forceRefresh] キャッシュ削除:', cacheNames);
    }

    // 2. Service Worker の登録解除（次回の起動で新SW再登録）
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(reg => reg.unregister()));
      console.log('[forceRefresh] SW登録解除:', regs.length, '件');
    }

    // 3. 少し待機してからリロード（キャッシュ操作が確実に反映されるように）
    await new Promise(resolve => setTimeout(resolve, 500));

    // 4. キャッシュを迂回する形で強制リロード
    //    URLにクエリパラメータを付けることで SW 以外のキャッシュも迂回
    const url = new URL(window.location.href);
    url.searchParams.set('_refresh', Date.now());
    window.location.replace(url.toString());
  } catch(e) {
    console.error('[forceRefresh] error:', e);
    alert('更新に失敗しました: ' + (e.message || e) + '\n\nブラウザを閉じて再度開いてください。');
    if (btn) {
      btn.classList.remove('refreshing');
      btn.querySelector('.header-btn-label').textContent = '更新';
      btn.disabled = false;
    }
  }
}

function loadFromStorage() {
  // 月切替時、localStorage に該当月のデータがない場合は tutugaData をリセット
  // (以前は raw が空だと前月のデータが残るバグがあった)
  const currentMonth = tutugaData.targetMonth || "";
  const currentStartDate = tutugaData.startDate || "";
  const emptyShape = () => ({
    targetMonth: currentMonth,
    startDate: currentStartDate,
    weeks: {},
    mech: {},
    elec: {}
  });
  try {
    const raw = localStorage.getItem(storageKey());
    if (raw) {
      const parsed = JSON.parse(raw);
      // 旧バグで「他の月のデータが今月のキーで保存されている」破損を検出
      // parsed.targetMonth が currentMonth と食い違うなら破損データとして破棄
      // Phase 19-E': ISO 汚染値による誤判定を防ぐため両辺を YYYY-MM 正規化して比較
      if (parsed && parsed.targetMonth && currentMonth &&
          normalizeMonthValue(parsed.targetMonth) !== normalizeMonthValue(currentMonth)) {
        console.warn('[loadFromStorage] 破損データ検出: key=' + storageKey() +
                     ' parsed.targetMonth=' + parsed.targetMonth +
                     ' (current=' + currentMonth + ') → 破棄してリセット');
        try { localStorage.removeItem(storageKey()); } catch(_) {}
        tutugaData = emptyShape();
      } else {
        tutugaData = Object.assign(emptyShape(), parsed);
        // Phase 19-E': localStorage 由来の ISO 汚染値を YYYY-MM に正規化
        tutugaData.targetMonth = normalizeMonthValue(tutugaData.targetMonth);
      }
    } else {
      // 該当月のlocalStorageがない場合は完全リセット（前月のデータ流出を防ぐ）
      tutugaData = emptyShape();
    }
  } catch (e) {
    tutugaData = emptyShape();
  }
  ensureStructure();
}

// 現在の water サブタブで描画されるフィールドキー集合
function getCurrentWaterFieldKeys() {
  if (currentWaterSub === "usage") {
    return TUTUGA_FIELDS.water.usage.concat(TUTUGA_FIELDS.water.usageFormExtras);
  }

// フェーズ3a (2026-06-09): 使用量週グリッド → tutugaData。各 data-day(mon..fri)→日番号(1..5) で
//   tutugaData.weeks[currentWeek][dayNum] の該当セルへ書込。月外列は disabled で非保存。
//   型処理は saveFormToData の usage 系（number / DASH text）と逐語一致。
function _saveWaterUsageGridToData() {
  const week = tutugaData.weeks[currentWeek];
  if (!week) return;
  const usageKeys = new Set(TUTUGA_FIELDS.water.usage.concat(TUTUGA_FIELDS.water.usageFormExtras));
  document.querySelectorAll("#formWrap [data-field][data-day]").forEach(el => {
    if (el.disabled) return;                       // 月外列は非保存
    const key = el.dataset.field;
    if (!usageKeys.has(key)) return;
    const dayNum = DAY_STR_TO_NUM[el.dataset.day];
    if (!dayNum) return;
    const cell = week[dayNum];
    if (!cell) return;
    if (el.type === "number") {
      if (el.value === "") { cell[key] = null; }
      else { const num = Number(el.value); cell[key] = isNaN(num) ? el.value : num; }
    } else if (el.type === "text" && DASH_SUPPORT_FIELDS.has(key)) {
      const v = (el.value || "").trim();
      if (v === "" || v === "-") { cell[key] = (v === "-") ? "-" : null; }
      else { const num = Number(v); cell[key] = isNaN(num) ? v : num; }
    } else {
      cell[key] = el.value;
    }
  });
}

// フェーズ3b (2026-06-09): 測定週グリッド → tutugaData。各 data-day(mon..fri)→日番号(1..5) で
//   tutugaData.weeks[currentWeek][dayNum] の該当セルへ書込。月外列は disabled で非保存。
//   型処理は旧 measure 単日の saveFormToData と逐語一致（bikou=sanitizeBikou / number=数値化 / text=そのまま）。
//   inspector は per-day 入力欄を持たない（monthInspector のみ）→ applyMonthInspectorToAllDays が展開＝ここでは触れない。
function _saveWaterMeasureGridToData() {
  const week = tutugaData.weeks[currentWeek];
  if (!week) return;
  const measureKeys = new Set(TUTUGA_FIELDS.water.measureFormFull);
  document.querySelectorAll("#formWrap [data-field][data-day]").forEach(el => {
    if (el.disabled) return;                       // 月外列は非保存
    const key = el.dataset.field;
    if (!measureKeys.has(key)) return;
    const dayNum = DAY_STR_TO_NUM[el.dataset.day];
    if (!dayNum) return;
    const cell = week[dayNum];
    if (!cell) return;
    if (key === "bikou") {
      // Phase 18-b: bikou に ISO タイムスタンプが入っていれば空に
      cell[key] = sanitizeBikou(el.value);
    } else if (el.type === "number") {
      if (el.value === "") { cell[key] = null; }
      else { const num = Number(el.value); cell[key] = isNaN(num) ? el.value : num; }
    } else {
      cell[key] = el.value;
    }
  });
}

function _isFieldEnterNavigable(el) {
  if (!el) return false;
  // 2026-06-12 仕様統一: 巡回対象はテキスト/数値 input のみ
  // （トグルボタン・select・チェックボックス類・readonly は移動先にしない）。
  if (el.tagName !== 'INPUT') return false;
  if (el.type !== 'number' && el.type !== 'text') return false;
  if (el.disabled || el.readOnly) return false;
  if (typeof window.getComputedStyle === 'function') {
    const style = window.getComputedStyle(el);
    if (style.display === 'none' || style.visibility === 'hidden') return false;
  }
  return true;
}

// Phase 8 修正06: モバイルキーボードに「次へ」キーを表示するため

function applyEnterKeyHintNext(rootEl) {
  if (!rootEl) return;
  rootEl.querySelectorAll('input, select').forEach(el => {
    if (el.disabled) return;
    if (el.type === 'hidden') return;
    el.setAttribute('enterkeyhint', 'next');
  });
}

// 指定要素を画面の上から1/3位置にスクロール
function scrollToTopThird(el) {
  if (!el) return;
  const rect = el.getBoundingClientRect();
  const viewportHeight = window.innerHeight || document.documentElement.clientHeight;
  const targetY = viewportHeight / 3;
  const currentY = rect.top;
  const scrollBy = currentY - targetY;
  window.scrollBy({ top: scrollBy, left: 0, behavior: 'smooth' });
}

// Enter キーで次のフィールドに進む（全タブ共通）
// - 同じビュー内の次フィールドがあればフォーカス移動
// - なければ advanceToNextDay() で次日（または equip では次週）へ自動切替
// - サブタブ跨ぎ・月跨ぎ・タブ跨ぎはしない
function advanceToNextField(currentEl) {
  const fields = getNavigableFields();
  const idx = fields.indexOf(currentEl);
  if (idx < 0) return;

  const next = fields[idx + 1];
  if (next) {
    next.focus();
    setTimeout(() => scrollToTopThird(next), 50);
    if (next.tagName === 'INPUT' && (next.type === 'number' || next.type === 'text')) {
      try { next.select(); } catch(e) {}
    }
    return;
  }
  // 同日（equip では同週）内に次フィールドなし → 次日 / 次週へ
  advanceToNextDay();
}

// 2026-06-12 仕様統一: 週内最終日（金曜列）の最下端では移動しない（フォーカス維持）。
// 全タブが週グリッド化済みのため「次の日の最上端へ」はフィールド配列（列優先 mon→fri）内で完結し、
// グリッド末尾＝週の終わり。週またぎ・サブタブ/タブ/月跨ぎの自動移動は行わない
// （旧フェーズ1/2/3a の「次週へ切替」を廃止。_advanceToNext*Week / _advanceToNextPerDayDay は未使用化）。
function advanceToNextDay() {
  return false;
}

function _advanceToNextPerDayDay(month) {
  const isActive = (currentSheet === 'water')
    ? isWaterDayActive
    : isElecMechDayActive;
  const dayOrder = ['mon','tue','wed','thu','fri'];
  const currentDayKey = DAY_NUM_TO_STR[currentDay] || 'mon';
  const dayIdx = dayOrder.indexOf(currentDayKey);

  // 同週内の次曜日
  for (let i = dayIdx + 1; i < dayOrder.length; i++) {
    if (isActive(month, currentWeek, dayOrder[i])) {
      _switchToPerDayContext(currentWeek, dayOrder[i]);
      return true;
    }
  }
  // 次週以降（最大第5週まで）
  for (let w = currentWeek + 1; w <= 5; w++) {
    for (let i = 0; i < dayOrder.length; i++) {
      if (isActive(month, w, dayOrder[i])) {
        _switchToPerDayContext(w, dayOrder[i]);
        return true;
      }
    }
  }
  return false;
}

function _switchToPerDayContext(week, dayKey) {
  // バグ修正03 と同じく切替前に保存（既存挙動維持）
  try { saveCurrentFormToData(); } catch (_) {}
  try { saveCurrentToLocalStorage(); } catch (_) {}
  currentWeek = Number(week);
  currentDay = DAY_STR_TO_NUM[dayKey] || 1;
  renderAll();
  setTimeout(_focusFirstNavigableField, 100);
}

function _advanceToNextEquipWeek(month) {
  for (let w = currentWeek + 1; w <= 5; w++) {
    let weekHasActive = false;
    for (const dk of ['mon','tue','wed','thu','fri']) {
      if (isElecMechDayActive(month, w, dk)) { weekHasActive = true; break; }
    }
    if (!weekHasActive) continue;
    try { saveCurrentFormToData(); } catch (_) {}
    try { saveCurrentToLocalStorage(); } catch (_) {}
    currentWeek = w;
    renderAll();
    setTimeout(_focusFirstNavigableField, 100);
    return true;
  }
  return false;
}

// フェーズ3a (2026-06-09): 水質 usage 週グリッドの「次週へ」。活性日は water 週モデルの
//   monthWeeks スロット（usage グリッドの列活性と同源）で判定。月跨ぎはしない。
function _advanceToNextWaterUsageWeek(month) {
  for (let w = currentWeek + 1; w <= 5; w++) {
    const slots = monthWeeks[w - 1];
    const hasActive = slots && [1,2,3,4,5].some(d => slots[d]);
    if (!hasActive) continue;
    try { saveCurrentFormToData(); } catch (_) {}
    try { saveCurrentToLocalStorage(); } catch (_) {}
    currentWeek = w;
    renderAll();
    setTimeout(_focusFirstNavigableField, 100);
    return true;
  }
  return false;
}

function _focusFirstNavigableField() {
  const fields = getNavigableFields();
  if (fields.length === 0) return;

// 水質: 指定日の指定サブタブ (usage/measure) に1つでも値があるか
// 測定者UI横展開: その日に「実測データ」があるか（測定者 inspector・備考 bikou は実測に数えない）。
// ✓表示(isDayFilledForSub の measure)と月単位測定者の展開ガード(applyMonthInspectorToAllDays)で共用。
function dayHasMeasurement(cell) {
  if (!cell || typeof cell !== "object") return false;
  return MEASURE_FIELDS.some(k => {
    if (k === "inspector" || k === "bikou") return false;
    const v = cell[k];
    return v !== null && v !== undefined && v !== "";
  });
}

function isDayFilledForSub(w, d, sub) {
  const cell = tutugaData.weeks[w] && tutugaData.weeks[w][d];
  if (!cell) return false;
  if (sub === "usage") {
    const keys = TUTUGA_FIELDS.water.usage.concat(TUTUGA_FIELDS.water.usageFormExtras);
    return keys.some(k => { const v = cell[k]; return v !== null && v !== undefined && v !== ""; });
  }
  // measure サブ: inspector/bikou は数えない
  return dayHasMeasurement(cell);
}

// 測定者UI横展開 (A方式): 月単位測定者(tutugaData.monthInspector)を per-day inspector へ展開。
// 判定は共有述語 dayHasMeasurement(cell)＝「実測データがある日」のみ。
// ensureStructure が全日の空セルを生成し inspector/bikou は cell に含まれるため、
// 無条件展開や bikou を実測扱いすると未実施日にも inspector が入り誤✓を生む。実測ベースで根絶。
function applyMonthInspectorToAllDays() {
  const name = (tutugaData.monthInspector || "").trim();
  const weeks = tutugaData.weeks || {};
  Object.keys(weeks).forEach(w => {
    const week = weeks[w] || {};
    Object.keys(week).forEach(dk => {
      const cell = week[dk];
      if (dayHasMeasurement(cell)) {
        if (name) cell.inspector = name;            // 実測がある日のみ展開
      } else if (cell && typeof cell === "object" && cell.inspector) {
        cell.inspector = "";                        // 実測なし日の誤伝播 inspector を剥がす
      }
    });
  });
}

// 測定者UI横展開: per-day inspector の代表値(最初の非空)を月単位欄へ反映。初期/月切替/同期後に呼ぶ。
function syncMonthInspectorFromDays() {
  let found = "";
  const weeks = tutugaData.weeks || {};
  outer:
  for (const w of Object.keys(weeks)) {
    const week = weeks[w] || {};
    for (const dk of Object.keys(week)) {
      const v = week[dk] && week[dk].inspector;
      if (v != null && String(v).trim() !== "") { found = String(v).trim(); break outer; }
    }
  }
  tutugaData.monthInspector = found;
  const el = document.getElementById("monthInspector");
  if (el) el.value = found;
}

// 指定週(1-based)内の Mon-Fri のうち、祝日・年末年始に該当する日を列挙する。
// weekSlots では null になっているため、Monday を推定して5日走査する。
function listHolidaysInWeek(weekIdx) {
  const ws = monthWeeks[weekIdx - 1];
  if (!ws) return [];
  let anchor = null, anchorDow = 0;
  for (let d = 1; d <= 5; d++) {
    if (ws[d]) { anchor = ws[d]; anchorDow = d; break; }
  }
  const ym = tutugaData.targetMonth;
  if (!ym || !/^\d{4}-\d{2}$/.test(ym)) return [];
  const [ty, tm] = ym.split("-").map(Number);
  let monday;
  if (anchor) {
    monday = new Date(anchor);
    monday.setDate(monday.getDate() - (anchorDow - 1));
  } else {
    return [];
  }
  const results = [];
  for (let i = 0; i < 5; i++) {
    const day = new Date(monday);
    day.setDate(monday.getDate() + i);
    if (day.getFullYear() !== ty || day.getMonth() + 1 !== tm) continue;
    const name = getHolidayName(day);
    if (name) results.push({ date: new Date(day), name });
  }
  return results;
}

function renderWeekInfo() {
  const wi = document.getElementById("weekInfo");
  const weekSlots = monthWeeks[currentWeek - 1];
  if (!weekSlots) {
    wi.textContent = `第${currentWeek}週 (該当なし)`;
    return;
  }
  // 週内の最初・最後の日付
  let first = null, last = null;
  for (let d = 1; d <= 5; d++) {
    if (weekSlots[d]) { if (!first) first = weekSlots[d]; last = weekSlots[d]; }
  }
  if (first && last) {
    const range = (first.getTime() === last.getTime())
      ? `${formatDateShort(first)}(${WEEKDAY_JP[first.getDay()]})`
      : `${formatDateShort(first)}(${WEEKDAY_JP[first.getDay()]}) 〜 ${formatDateShort(last)}(${WEEKDAY_JP[last.getDay()]})`;
    const count = [1,2,3,4,5].filter(d => weekSlots[d]).length;
    const holidays = listHolidaysInWeek(currentWeek);
    let text = `第${currentWeek}週 (${range}) — ${count}日`;
    if (holidays.length > 0) {
      const parts = holidays.map(h => `${formatDateShort(h.date)}(${WEEKDAY_JP[h.date.getDay()]}) ${h.name}`);
      text += ` ／ 休: ${parts.join(", ")}`;
    }
    wi.textContent = text;
  } else {
    const holidays = listHolidaysInWeek(currentWeek);
    if (holidays.length > 0) {
      const parts = holidays.map(h => `${formatDateShort(h.date)}(${WEEKDAY_JP[h.date.getDay()]}) ${h.name}`);
      wi.textContent = `第${currentWeek}週 (全休業日) ／ 休: ${parts.join(", ")}`;
    } else {
      wi.textContent = `第${currentWeek}週 (該当なし)`;
    }
  }
}

// 水質測定 (measure) のフォームグループ定義 — Phase 5a 簡易版
// グループ: 水温 / 透視度 / PH / SV / MLSS / 汚泥界面 / 塩素 / その他
// Phase 8 修正08: 外観・臭気は固定値運用に変更したためフォームから削除

function renderForm() {
  const wrap = document.getElementById("formWrap");
  if (!wrap) return;

  let html = "";
  if (currentWaterSub === "usage") {
    // フェーズ3a (2026-06-09): 使用量は「月〜金5日を1画面の週グリッド」（nextMon 列は作らない＝
    //   翌週月曜セルは送信層 _tutugaBuildWaterUsagePayload が自動流用するため入力 UI 不要）。
    html = buildWaterUsageWeekGridHtml();
  } else {
    // フェーズ3b (2026-06-09): 水質測定も「月〜金5日を1画面の週グリッド」へ。
    //   最上部に月単位測定者（id=monthInspector・data-field 無し＝[data-field] 収集/復元/grid 保存の対象外）を
    //   1個だけ置き、その下に measure 週グリッド（9数値グループ＋備考 × 月〜金）。inspector の per-day 展開は
    //   applyMonthInspectorToAllDays（実測日のみ）に委譲＝無改修。nextMon 列は作らない。
    // 測定者UI横展開 (A方式): monthInspector は自前パディング div で包む（grid wrap は自前の左右マージンを持つ）。
    html += `<div style="padding:12px 12px 0;"><div class="section"><div class="section-header">測定者（今月）</div>`;
    html += `<div class="field"><span class="label">測定者名</span><span class="unit"></span><input type="text" id="monthInspector" placeholder="今月の測定者名"></div>`;
    html += `</div></div>`;
    html += buildWaterMeasureWeekGridHtml();
  }

  wrap.innerHTML = html;

  // フェーズ3a/3b: usage/measure とも週グリッド＝.equip-table-wrap が左右マージンを持つため
  //   form-wrap の padding は外す（measure は monthInspector を自前パディング div で包む）。
  wrap.style.padding = '0';

  // 測定者UI横展開: 月単位測定者欄（data-field 無し）の値復元 + 同期リスナー（再描画ごとに新要素へ再配線）
  const monthInspectorEl = document.getElementById("monthInspector");
  if (monthInspectorEl) {
    monthInspectorEl.value = (tutugaData.monthInspector || "");
    monthInspectorEl.addEventListener("input", () => {
      tutugaData.monthInspector = monthInspectorEl.value;
      markDirty();
    });
  }

  wrap.querySelectorAll("input[data-field]").forEach(el => {
    el.addEventListener("input", () => markDirty());
    el.addEventListener("change", () => markDirty());
    el.addEventListener("keydown", (ev) => {
      if (ev.key === "Enter") {
        ev.preventDefault();
        advanceToNextField(el);
      }
    });
  });
  wrap.querySelectorAll("select[data-field]").forEach(sel => {
    sel.addEventListener("change", () => markDirty());
    sel.addEventListener("keydown", (ev) => {
      if (ev.key === "Enter") {
        ev.preventDefault();
        advanceToNextField(sel);
      }
    });
  });
  wrap.querySelectorAll(".toggle-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      let opts;
      try { opts = JSON.parse(btn.dataset.options || "[]"); } catch(e) { opts = []; }
      if (opts.length === 0) return;
      const current = btn.dataset.val || "";
      let idx = opts.indexOf(current);
      idx = (idx + 1) % (opts.length + 1);
      const next = idx === opts.length ? "" : opts[idx];
      btn.dataset.val = next;
      btn.textContent = next || "―";
      markDirty();
      // Phase 8 修正04A: トグルボタン変更を Undo スタックに記録
      if (!isUndoing && current !== next) {
        const ctx = getCurrentUndoContext();
        const fieldKey = btn.dataset.field;
        if (fieldKey) {
          pushFieldUndo({
            tab: ctx.tab, subtab: ctx.subtab, week: ctx.week,
            day: ctx.day, month: ctx.month,
            fieldKey: fieldKey, oldValue: current, newValue: next
          });
        }
      }
    });
  });

  // フェーズ3a/3b: usage/measure とも週グリッドの列見出し 個別「前日コピー」「クリア」を配線（mech/elec と同方式）。
  //   dayOverride により列（曜日）単位で作用。getCurrentFormFields が water を data-day で絞るため非波及。
  //   前日コピーの inspector/bikou 除外は shouldSkipFieldForCopy（water は両者 skip）が自動で担保。
  wrap.querySelectorAll('.btn-equip-day-copy').forEach(btn => {
    btn.addEventListener('click', () => { copyPreviousDayToCurrent(btn.dataset.day); });
  });
  wrap.querySelectorAll('.btn-equip-day-clear').forEach(btn => {
    btn.addEventListener('click', () => { clearCurrentForm(btn.dataset.day); });
  });

  // Phase 8 修正04A: input/select の単一フィールド変更を Undo スタックに記録
  attachUndoTracking(wrap);

  // Phase 8 修正06: モバイルキーボードに「次へ」キーを表示
  applyEnterKeyHintNext(wrap);

  loadDataToForm();
  applyWaterFormUsabilityCues();   // 手順2: 祝日ノート(2-1) + 空欄ハイライト(2-2)
}

// =====================================================
// フェーズ3a (2026-06-09): 水質「使用量」週グリッド HTML 生成（雛形＝機械グリッド）。
//   行＝使用量11項目（1セクション）、列＝項目＋月〜金（nextMon 列は作らない）。
//   各セルに data-field（既存キー）＋ data-day（mon..fri）。型は renderForm の usage と逐語一致
//   （DASH_SUPPORT_FIELDS → text/inputmode=decimal、それ以外 → number/step=0.01）。
//   列の活性/祝日/月外は単日と同源（monthWeeks[currentWeek-1] のスロット ＋ _tutugaIsHolidayWD）。
//   月外列＝disabled+day-disabled（非保存）、祝日列＝col/cell-holiday（入力可・送信層がブランク）。
// =====================================================
function buildWaterUsageWeekGridHtml() {
  const usageKeys = TUTUGA_FIELDS.water.usage.concat(TUTUGA_FIELDS.water.usageFormExtras);
  const dayLabels = { mon: "月", tue: "火", wed: "水", thu: "木", fri: "金" };
  const weekSlots = monthWeeks[currentWeek - 1] || {};

  const cols = [1, 2, 3, 4, 5].map(d => {
    const dk = DAY_NUM_TO_STR[d];
    const date = weekSlots[d] || null;
    const enabled = !!date;
    const isHol = enabled && _tutugaIsHolidayWD(currentWeek, d);
    return { d, dk, date, enabled, isHol };
  });

  let headHtml = '<th>項目</th>';
  cols.forEach(c => {
    const holBadge = c.isHol ? `<span class="tutuga-holiday-badge">祝</span>` : "";
    const dateStr = c.date
      ? `<br><span style="font-size:10px;font-weight:normal;opacity:.7;">${c.date.getMonth() + 1}/${c.date.getDate()}${holBadge}</span>`
      : "";
    const dayActions = c.date
      ? `<div class="equip-day-actions"><button type="button" class="btn-equip-day-copy" data-day="${c.dk}" title="${dayLabels[c.dk]}曜日に前日コピー">前日コピー</button><button type="button" class="btn-equip-day-clear" data-day="${c.dk}" title="${dayLabels[c.dk]}曜日をクリア">クリア</button></div>`
      : "";
    headHtml += `<th class="col-${c.dk}${c.isHol ? ' col-holiday' : ''}">${dayLabels[c.dk]}${dateStr}${dayActions}</th>`;
  });

  let bodyHtml = `<tr class="section-header"><td colspan="6">使用量</td></tr>`;
  usageKeys.forEach(key => {
    const meta = USAGE_LABELS[key] || { label: key, unit: "" };
    const unit = meta.unit ? `<span class="item-unit">${escapeHtml(meta.unit)}</span>` : "";
    bodyHtml += `<tr><td><span class="item-label">${escapeHtml(meta.label)}</span>${unit}</td>`;
    cols.forEach(c => {
      const tdCls = ((c.enabled ? "" : "day-disabled") + (c.isHol ? " cell-holiday" : "")).trim();
      const tdClsAttr = tdCls ? ` class="${tdCls}"` : "";
      const disabledAttr = c.enabled ? "" : " disabled";
      bodyHtml += `<td${tdClsAttr}>${buildWaterUsageCellHtml(key, c.dk, disabledAttr)}</td>`;
    });
    bodyHtml += `</tr>`;
  });

  return `<div class="equip-table-wrap"><table class="equip-table" id="waterUsageTable">`
       + `<thead><tr>${headHtml}</tr></thead><tbody>${bodyHtml}</tbody></table></div>`;
}

// 使用量グリッドの1セル。renderForm の usage 型ロジックと逐語一致（data-field + data-day）。
function buildWaterUsageCellHtml(key, dayKey, disabledAttr) {
  const keyEsc = escapeHtml(key);
  if (DASH_SUPPORT_FIELDS.has(key)) {
    return `<input type="text" inputmode="decimal" data-field="${keyEsc}" data-day="${dayKey}"${disabledAttr}>`;
  }
  return `<input type="number" inputmode="decimal" step="0.01" data-field="${keyEsc}" data-day="${dayKey}"${disabledAttr}>`;
}

  const dayLabels = { mon: "月", tue: "火", wed: "水", thu: "木", fri: "金" };
  const weekSlots = monthWeeks[currentWeek - 1] || {};

  cols.forEach(c => {

// 測定グリッドの1セル。MEASURE_FIELD_META[key].type で型分岐（buildWaterUsageCellHtml と同方針）。
//   number → number/step=meta.step、text → text（bikou）。data-field + data-day を付与。
function buildWaterMeasureCellHtml(key, dayKey, disabledAttr) {
  const keyEsc = escapeHtml(key);
  const meta = MEASURE_FIELD_META[key] || { type: "text" };
  if (meta.type === "number") {
    return `<input type="number" inputmode="decimal" step="${meta.step || "1"}" data-field="${keyEsc}" data-day="${dayKey}"${disabledAttr}>`;
  }
  return `<input type="text" data-field="${keyEsc}" data-day="${dayKey}"${disabledAttr}>`;
}

// 手順2-1/2-2: 水フォームに祝日ノートと「埋まっているべき空欄」ハイライトを反映。
// 判定は _tutugaIsGapCell（②祝日ブランク・dayHasMeasurement と整合）を通すため、
// 祝日の積算空欄・非測定日の do1/do2 を誤検知しない。
function applyWaterFormUsabilityCues() {
  if (currentSheet !== 'water') return;
  const wrap = document.getElementById('formWrap');
  if (!wrap) return;

  // フェーズ3a/3b (2026-06-09): usage/measure とも週グリッド＝列ごとに空欄ハイライトを適用（各 data-day の曜日で判定）。
  //   祝日シェーディングはグリッド HTML 側(col/cell-holiday)で対応済。単日の祝日ノートは出さない（撤去）。
  //   判定は既存 _tutugaIsGapCell に集約＝祝日の積算空欄・非測定日の do1/do2 等を誤検知しない
  //   （measure は TUTUGA_MEASURE_EXPECTED_SET ∧ dayHasMeasurement、終沈6/bikou/inspector は対象外）。
  const note = document.getElementById('tutugaHolidayNote');
  if (note) note.remove();
  wrap.querySelectorAll('[data-field][data-day]').forEach(function (el) {
    const key = el.dataset.field;
    const dnum = DAY_STR_TO_NUM[el.dataset.day];
    el.classList.toggle('tutuga-gap', dnum ? _tutugaIsGapCell(currentWeek, dnum, key) : false);
  });
}

// =====================================================
// 手順2-3: 整合スキャン。2-2 と同一述語 _tutugaIsGapCell で空欄を判定し、
//   (a) 入力もれ（非祝日・要入力の空欄）/ (b) 機器名 未マッピング / (c) 機器名 重複 を集計。
//   祝日の積算空欄・非測定日の measure は _tutugaIsGapCell が除外 → 誤検知しない。
// =====================================================
function runIntegrityScan() {
  const result = { gaps: [], unmapped: [], duplicates: [] };

  // (a) 埋めるべき空欄（水タブ: usage 累積/使用量 + measure 測定値、週×日×キー）
  const usageKeys = TUTUGA_USAGE_EXPECTED_KEYS;
  const measureKeys = Object.keys(TUTUGA_MEASURE_EXPECTED_SET);
  const allKeys = usageKeys.concat(measureKeys);
  for (let w = 1; w <= 5; w++) {
    for (let d = 1; d <= 5; d++) {
      const date = (typeof getDateForDay === 'function') ? getDateForDay(w, d) : null;
      if (!date) continue;                          // 月内日のみ
      allKeys.forEach(function (key) {
        if (_tutugaIsGapCell(w, d, key)) {
          result.gaps.push({
            week: w, day: d,
            dateLabel: formatDateShort(date) + '(' + WEEKDAY_JP[date.getDay()] + ')',
            label: _tutugaFieldLabel(key),
            kind: (usageKeys.indexOf(key) >= 0) ? 'usage' : 'measure'
          });
        }
      });
    }
  }

  // (b)(c) 機器名: ローカル equip データを監査（手順1 解決後も非内部キーが残れば検出。リロード後も現状から再導出）
  const eq = (tutugaData && tutugaData.equip) || {};
  Object.keys(eq).forEach(function (wRaw) {
    const w = parseInt(wRaw, 10);
    const week = eq[wRaw];
    if (!week || typeof week !== 'object') return;
    Object.keys(week).forEach(function (k) {
      if (EQUIP_KEY_SET[k]) return;                 // 内部キー = 正常
      const resolved = (typeof _resolveEquipKey === 'function') ? _resolveEquipKey(k) : null;
      if (resolved) {
        // 非内部キーだが内部キーに解決可能 = 表記ゆれ/重複ソース（render は内部キーで読むため要再同期）
        result.duplicates.push({ week: w, key: resolved, names: [k, resolved] });
      } else {
        // 内部キーに解決できない = 未マッピングのラベル
        result.unmapped.push({ week: w, name: k });
      }
    });
  });

  return result;
}

function _scanSection(title, count, itemsHtml) {
  const cls = count === 0 ? 'ok' : 'warn';
  let h = '<div class="tutuga-scan-section"><h4>' + escapeHtml(title) + ' <span class="tutuga-scan-count ' + cls + '">' + count + '</span></h4>';
  if (count === 0) {
    h += '<div style="color:#2e7d32;font-size:12.5px;padding:2px 8px;">問題なし</div>';
  } else {
    h += '<ul class="tutuga-scan-list">' + itemsHtml.join('') + '</ul>';
  }
  return h + '</div>';
}
function _scanScopeNote() {
  return '<div style="margin-top:8px;padding:8px 10px;background:#f4f7fb;border-radius:6px;color:#555;font-size:11.5px;line-height:1.6;">'
       + '対象: 水質タブの日次累積/使用量（返送汚泥・放流・固形塩素）と測定値（DO 等）。<br>'
       + '除外: 祝日の積算空欄（②ブランク＝正常）・非測定日の測定値・手付かずの日・機器運転/電気/機械タブ。</div>';
}
function _buildScanHtml(r, total) {
  if (total === 0) {
    return '<div class="tutuga-scan-empty">✅ 問題は見つかりませんでした（祝日の積算空欄・非測定日の測定値は対象外）。</div>' + _scanScopeNote();
  }
  let h = '';
  h += _scanSection('① 入力もれ（非祝日・要入力の空欄）', r.gaps.length, r.gaps.map(function (g) {
    const kindLabel = g.kind === 'usage' ? '使用量' : '測定値';
    return '<li><span class="loc">第' + g.week + '週 ' + escapeHtml(g.dateLabel) + '</span> ／ ' + escapeHtml(g.label) + '（' + kindLabel + '）</li>';
  }));
  h += _scanSection('② 機器名 未マッピング（同期データが内部キーに解決できず）', r.unmapped.length, r.unmapped.map(function (u) {
    return '<li><span class="loc">第' + u.week + '週</span> ／ ' + escapeHtml(u.name) + '</li>';
  }));
  h += _scanSection('③ 機器名 重複（複数表記が同一機器を指す）', r.duplicates.length, r.duplicates.map(function (d) {
    return '<li><span class="loc">第' + d.week + '週</span> ／ ' + escapeHtml(d.names[0]) + ' → ' + escapeHtml(d.key) + '</li>';
  }));
  return h + _scanScopeNote();
}

function showScanDialog() {
  const r = runIntegrityScan();
  const total = r.gaps.length + r.unmapped.length + r.duplicates.length;

  let dialog = document.getElementById('scanDialog');
  if (!dialog) {
    dialog = document.createElement('div');
    dialog.id = 'scanDialog';
    dialog.style.cssText = 'display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center;';
    dialog.innerHTML = `
      <div style="background:#fff;width:92%;max-width:680px;max-height:85vh;border-radius:12px;display:flex;flex-direction:column;box-shadow:0 10px 30px rgba(0,0,0,0.3);">
        <div style="padding:16px 20px;border-bottom:1px solid #e0e0e0;display:flex;justify-content:space-between;align-items:center;background:#1a4f8a;color:#fff;border-radius:12px 12px 0 0;">
          <h3 style="margin:0;font-size:17px;">🔍 整合スキャン</h3>
          <button type="button" id="closeScanBtn" style="background:rgba(255,255,255,0.2);color:#fff;border:1px solid rgba(255,255,255,0.5);padding:6px 14px;border-radius:6px;cursor:pointer;font-weight:600;">閉じる</button>
        </div>
        <div class="scan-body" style="flex:1;overflow:auto;padding:16px 20px;"></div>
      </div>`;
    document.body.appendChild(dialog);
    document.getElementById('closeScanBtn').addEventListener('click', function () { dialog.style.display = 'none'; });
    dialog.addEventListener('click', function (e) { if (e.target === dialog) dialog.style.display = 'none'; });
  }
  dialog.querySelector('.scan-body').innerHTML = _buildScanHtml(r, total);
  dialog.style.display = 'flex';
}

function renderWeekTabs() {
  const container = document.getElementById("weekTabs");
  if (!container) return;
  const numWeeks = monthWeeks.length;
  // 月が未設定ならデフォルト5週タブ
  const weeksToShow = numWeeks > 0 ? numWeeks : 5;
  if (currentWeek > weeksToShow) currentWeek = 1;
  let html = "";
  for (let w = 1; w <= weeksToShow; w++) {
    const active = w === currentWeek ? "active" : "";
    const slots = monthWeeks[w - 1];
    const count = slots ? [1,2,3,4,5].filter(d => slots[d]).length : 0;
    const badge = slots && count < 5 ? `<span class="pct">${count}日</span>` : "";
    html += `<button type="button" data-week="${w}" class="${active}">第${w}週${badge}</button>`;
  }
  container.innerHTML = html;
  container.querySelectorAll("button").forEach(btn => {
    btn.addEventListener("click", () => {
      saveCurrentFormToData();
      saveCurrentToLocalStorage();  // Phase 8 修正03: 切替前に localStorage 保存
      currentWeek = Number(btn.dataset.week);
      // 新しい週で currentDay が月外なら、最初の有効日にスナップ
      const ws = monthWeeks[currentWeek - 1];
      if (ws && !ws[currentDay]) {
        for (let d = 1; d <= 5; d++) if (ws[d]) { currentDay = d; break; }
      }
      renderAll();
    });
  });
}

function renderSecTabs() {
  // 水質サブタブ (使用量/水質測定)
  document.querySelectorAll("#waterSubTabs button").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.waterSub === currentWaterSub);
  });
}

function renderAll() {
  recomputeMonthWeeks();
  ensureStructure();
  // currentMain を currentSheet に同期
  currentMain = currentSheet;
  // 旧 currentMechWeek/Elec week は currentWeek と同期
  currentMechWeek = currentWeek;
  currentElecWeek = currentWeek;
  currentMechPart = currentMechSub;
  currentElecPart = currentElecSub;

  const waterPanel = document.getElementById("waterPanel");
  const equipPanel = document.getElementById("equipPanel");
  const mechPanel  = document.getElementById("mechPanel");
  const elecPanel  = document.getElementById("elecPanel");
  const btnCopy  = document.getElementById("btnCopy");
  const btnClear = document.getElementById("btnClear");
  const btnExcel = document.getElementById("btnExcel");

  // メインタブ active
  document.querySelectorAll("#mainTabs button").forEach(b => {
    b.classList.toggle("active", b.dataset.sheet === currentSheet);
  });

  if (waterPanel) waterPanel.style.display = "none";
  if (equipPanel) equipPanel.style.display = "none";
  if (mechPanel)  mechPanel.style.display  = "none";
  if (elecPanel)  elecPanel.style.display  = "none";

  // Phase 8 修正04C/04D: 共通の「前日コピー」「クリア」は equip タブで非表示
  // （equip タブには各日の日付ラベル右隣に個別ボタンを配置するため）
  // 「保存」「元に戻す」は全タブ共通で表示維持。
  // フェーズ1/2 (2026-06-08): 機械・電気も週グリッド化で列見出しに個別ボタンを持つため非表示対象に追加。
  const usesPerColumnDayBtns = (currentSheet === "equip" || currentSheet === "mech" || currentSheet === "elec"
    || currentSheet === "water");  // フェーズ3a/3b: 水質 usage/measure とも週グリッド＝列見出しに個別ボタン
  if (btnCopy)  btnCopy.style.display  = usesPerColumnDayBtns ? "none" : "";
  if (btnClear) btnClear.style.display = usesPerColumnDayBtns ? "none" : "";

  if (currentSheet === "water") {
    if (waterPanel) waterPanel.style.display = "";
    if (btnExcel) btnExcel.style.display = "";
    renderWeekTabs();
    renderSecTabs();
    renderDayTabs();
    renderWeekInfo();
    renderForm();
  } else if (currentSheet === "equip") {
    if (equipPanel) equipPanel.style.display = "";
    if (btnExcel) btnExcel.style.display = "";
    renderEquipPanel();
  } else if (currentSheet === "mech") {
    if (mechPanel) mechPanel.style.display = "";
    if (btnExcel) btnExcel.style.display = "";
    renderMechPanel();
  } else if (currentSheet === "elec") {
    if (elecPanel) elecPanel.style.display = "";
    if (btnExcel) btnExcel.style.display = "";
    renderElecPanel();
  }
}

// ===== 機器運転時間パネル (Phase 5a 簡易実装) =====
function renderEquipPanel() {
  const panel = document.getElementById("equipPanel");
  if (!panel) return;
  // 週タブ active
  document.querySelectorAll("#equipWeekTabs button").forEach(b => {
    b.classList.toggle("active", Number(b.dataset.week) === currentWeek);
    if (!b._tutugaBound) {
      b._tutugaBound = true;
      b.addEventListener("click", () => {
        saveCurrentFormToData();
        saveCurrentToLocalStorage();  // Phase 8 修正03: 切替前に localStorage 保存
        currentWeek = Number(b.dataset.week);
        renderAll();
      });
    }
  });

  const head = document.getElementById("equipTableHead");
  const body = document.getElementById("equipBody");
  if (!head || !body) return;

  // ヘッダー: 機器/項目 | 月 火 水 木 金
  const dayLabels = ["月","火","水","木","金"];
  let headHtml = '<th>機器</th>';
  EQUIP_DAYS.forEach((dk, i) => {
    const date = getDateForDayKey(currentWeek, dk);
    const isHol = !!date && _tutugaIsHolidayWD(currentWeek, DAY_STR_TO_NUM[dk]);
    const holBadge = isHol ? `<span class="tutuga-holiday-badge">祝</span>` : "";
    const dateStr = date ? `<br><span style="font-size:10px;font-weight:normal;opacity:.7;">${date.getMonth()+1}/${date.getDate()}${holBadge}</span>` : "";
    // Phase 8 修正04D: 月内日のみ個別ボタン（クリア・前日コピー）を表示
    const dayActions = date
      ? `<div class="equip-day-actions"><button type="button" class="btn-equip-day-copy" data-day="${dk}" title="${dayLabels[i]}曜日に前日コピー">前日コピー</button><button type="button" class="btn-equip-day-clear" data-day="${dk}" title="${dayLabels[i]}曜日をクリア">クリア</button></div>`
      : '';
    headHtml += `<th class="col-${dk}${isHol ? ' col-holiday' : ''}">${dayLabels[i]}${dateStr}${dayActions}</th>`;
  });
  head.innerHTML = headHtml;

  // Phase 8 修正04D: 個別ボタンの click ハンドラを attach
  // （head.innerHTML 再生成ごとに新しい要素が作られるため毎回 attach で OK）
  head.querySelectorAll('.btn-equip-day-clear').forEach(btn => {
    btn.addEventListener('click', () => {
      clearCurrentForm(btn.dataset.day);
    });
  });
  head.querySelectorAll('.btn-equip-day-copy').forEach(btn => {
    btn.addEventListener('click', () => {
      copyPreviousDayToCurrent(btn.dataset.day);
    });
  });

  // 本体: 22機器 × 5曜日
  let bodyHtml = "";
  TUTUGA_FIELDS.equip.keys.forEach((key, i) => {
    const label = TUTUGA_FIELDS.equip.labels[i] || key;
    bodyHtml += `<tr><td>${escapeHtml(label)}</td>`;
    EQUIP_DAYS.forEach(dk => {
      const date = getDateForDayKey(currentWeek, dk);
      const enabled = !!date;
      const isHol = enabled && _tutugaIsHolidayWD(currentWeek, DAY_STR_TO_NUM[dk]);
      const clsList = (enabled ? "" : "day-disabled") + (isHol ? " cell-holiday" : "");
      const tdCls = clsList.trim() ? ` class="${clsList.trim()}"` : "";
      const disabledAttr = enabled ? "" : ' disabled';
      bodyHtml += `<td${tdCls}><input type="number" inputmode="decimal" step="0.1" data-equip="${key}" data-eday="${dk}"${disabledAttr}></td>`;
    });
    bodyHtml += `</tr>`;
  });
  body.innerHTML = bodyHtml;

  loadEquipDataToForm();

  // イベント (委譲)
  if (!body._tutugaBound) {
    body._tutugaBound = true;
    body.addEventListener("input", (ev) => {
      if (ev.target.matches('input[data-equip]')) {
        saveEquipFormToData();
        markDirty();
      }
    });
    // Phase 8 修正06: Enter キーで次フィールドへ自動移動（列優先、同週最後で次週へ）
    body.addEventListener("keydown", (ev) => {
      if (ev.key !== 'Enter') return;
      if (ev.target.tagName === 'TEXTAREA') return;
      if (!ev.target.matches('input[data-equip]')) return;
      ev.preventDefault();
      advanceToNextField(ev.target);
    });
  }

  // Phase 8 修正04A: 単一フィールド変更を Undo スタックに記録
  attachUndoTracking(body);

  // Phase 8 修正06: モバイルキーボードに「次へ」キーを表示
  applyEnterKeyHintNext(body);
}

function loadEquipDataToForm() {
  const week = (tutugaData.equip && tutugaData.equip[currentWeek]) || {};
  document.querySelectorAll('#equipBody input[data-equip]').forEach(el => {
    const key = el.dataset.equip;
    const dk = el.dataset.eday;
    const v = (week[key] && (dk in week[key])) ? week[key][dk] : null;
    el.value = (v === null || v === undefined) ? "" : v;
  });
}

function saveEquipFormToData() {
  if (!tutugaData.equip) tutugaData.equip = {};
  if (!tutugaData.equip[currentWeek]) tutugaData.equip[currentWeek] = emptyEquipWeek();
  const week = tutugaData.equip[currentWeek];
  document.querySelectorAll('#equipBody input[data-equip]').forEach(el => {
    if (el.disabled) return;
    const key = el.dataset.equip;
    const dk = el.dataset.eday;
    if (!week[key]) week[key] = {};
    const v = (el.value || "").trim();
    week[key][dk] = (v === "") ? null : v;
  });
}

// =====================================================
// B-1 追加: 機械・電気設備 描画関数
// =====================================================

// 指定週・曜日キーから実際の Date を取得（既存の getDateForDay は数字キー版）
function getDateForDayKey(weekIdx, dayKey) {
  const dayIdx = DAY_STR_TO_NUM[dayKey];
  if (!dayIdx) return null;
  return getDateForDay(weekIdx, dayIdx);
}

// パターンに応じて活性日を判定
function isDayActiveForPattern(pattern, dayKey) {
  const p = SCHEDULE_PATTERNS[pattern];
  return p ? p.days.indexOf(dayKey) >= 0 : false;
}

// 機器セクション + 項目行のHTML生成（共通）
// kind: "mech" or "elec"
// part: 1 | 2 | 3
// weekIdx: 1〜5
// 機械/電気: 指定サブタブのセクション配列を取得
function getMechSectionsForSub(sub) {
  return TUTUGA_FIELDS.mech["sub" + sub] || [];
}
function getElecSectionsForSub(sub) {
  return TUTUGA_FIELDS.elec["sub" + sub] || [];
}

// 機械/電気: 1サブタブ分のフォームHTMLを生成
// kind: "mech" | "elec"
// 表示は currentDay (1-5) の曜日のみ。フォームは縦リスト
function buildEquipFormHtml(kind, sub, weekIdx, dayIdx) {
  // フェーズ1 (2026-06-08): 機械設備は「月〜金5日を1画面の週グリッド」表示へ移行。
  //   雛形＝機器運転時間グリッド（.equip-table）。データモデル・保存/読込は無改修
  //   （tutugaData.mech[w].days[dk][key] が日別独立・全日プリアロケート済のため、
  //    各入力に正しい data-day を付ければ saveMechElecFormToData/loadMechElecDataToForm が多日対応する）。
  //   電気は従来どおり currentDay 1日分の縦リスト（次フェーズで autoCalc 多日化と併せ対応）。
  if (kind === "mech") {
    return buildMechWeekGridHtml(sub, weekIdx);
  }
  // フェーズ2 (2026-06-08): 電気設備も週グリッド化（機械と同方式）。
  //   差分: autoCalc(=__使用量, 読み−前回) は編集不可の表示セルとして各列に出す
  //   （type:'auto' の転記読みは現行単日どおり非表示）。recomputeElecAutoCalc が値を書き込む。
  if (kind === "elec") {
    return buildElecWeekGridHtml(sub, weekIdx);
  }
  const sections = (kind === "mech") ? getMechSectionsForSub(sub) : getElecSectionsForSub(sub);
  const dataAttr = (kind === "mech") ? "data-mfield" : "data-efield";
  const dayKey = DAY_NUM_TO_STR[dayIdx] || "mon";
  // dayIdx は currentDay 由来の数値 (1-5)。getDateForDay は数値版、getDateForDayKey は文字列版なので使い分け必須。
  const date = getDateForDay(weekIdx, dayIdx);
  const enabled = !!date;
  const disabledAttr = enabled ? "" : " disabled";

  let html = "";
  if (!date) {
    html += `<div class="week-info" style="color:#999;">この曜日は対象月外です</div>`;
  }
  sections.forEach(sec => {
    // Phase 8 修正04B: auto/autoCalc しかないセクションはセクションヘッダも描画しない
    const visibleFields = (sec.fields || []).filter(f => f.type !== 'auto' && f.type !== 'autoCalc');
    if (visibleFields.length === 0) return;
    html += `<div class="section"><div class="section-header">${escapeHtml(sec.title)}</div>`;
    visibleFields.forEach(f => {
      // Phase 8 修正04B: type:'auto' (GAS 自動転記) と type:'autoCalc' (使用量自動計算) は
      // ユーザー入力不可のためフォーム描画から完全に省略。
      // 計算ロジック・保存・GAS 送信・Excel 出力は維持（recomputeElecAutoCalc 等は別経路で動作）。
      html += `<div class="field"><span class="label">${escapeHtml(f.label)}</span><span class="unit">${escapeHtml(f.unit || "")}</span>`;
      if (f.type === "number") {
        // Phase 8 修正05: 電気・機械の数値項目は半角ハイフン `-`（休止/該当なし）を許容。
        // type を text 化し、data-elec-mech-numeric マーカーで onInput バリデーションを有効にする。
        html += `<input type="text" inputmode="decimal" data-elec-mech-numeric="1" ${dataAttr}="${escapeHtml(f.key)}" data-day="${dayKey}"${disabledAttr}>`;
      } else if (f.type === "text") {
        html += `<input type="text" inputmode="${f.inputmode || 'decimal'}" ${dataAttr}="${escapeHtml(f.key)}" data-day="${dayKey}"${disabledAttr}>`;
      } else if (f.type === "numdash") {
        // Phase 8 修正05: numdash も「数値 or `-` or 空」の同じバリデーションに統一
        html += `<input type="text" inputmode="decimal" data-elec-mech-numeric="1" ${dataAttr}="${escapeHtml(f.key)}" data-day="${dayKey}" placeholder="-"${disabledAttr}>`;
      } else if (f.type === "toggle") {
        // Phase 8 修正05: 電気・機械のトグルに `-`（休止/該当なし）を追加。
        // TUTUGA_FIELDS 側の options は変更せず、描画時にのみ拡張（既存定義に副作用を与えない）。
        const baseOpts = Array.isArray(f.options) ? f.options : [];
        const augmented = baseOpts.indexOf('-') >= 0 ? baseOpts : baseOpts.concat(['-']);
        const opts = JSON.stringify(augmented).replace(/"/g, '&quot;');
        html += `<button type="button" class="toggle-btn" ${dataAttr}="${escapeHtml(f.key)}" data-day="${dayKey}" data-options="${opts}"${disabledAttr}>―</button>`;
      } else {
        html += `<span style="color:#999;">―</span>`;
      }
      html += `</div>`;
    });
    html += `</div>`;
  });
  return html;
}

// =====================================================
// フェーズ1 (2026-06-08): 機械設備 週グリッド HTML 生成
//   行＝セクション見出し（sec.title）＋項目（f.label）、列＝項目ラベル＋月〜金5列。
//   各セルは data-mfield + data-day を持つ <input>/<button.toggle-btn>。
//   月外日＝disabled+day-disabled、祝日＝col-holiday/cell-holiday シェーディング
//   （機器運転時間グリッド renderEquipPanel と同一の enabled/isHol ロジックを踏襲）。
//   ※ 祝日列も入力可能（シェーディングのみ）。保存除外は水質 usage 累積のみで機械は対象外。
// =====================================================
function buildMechWeekGridHtml(sub, weekIdx) {
  const sections = getMechSectionsForSub(sub);
  const dayLabels = { mon: "月", tue: "火", wed: "水", thu: "木", fri: "金" };

  // 列メタ（曜日キー・日付・活性・祝日）
  const cols = EQUIP_DAYS.map(dk => {
    const date = getDateForDayKey(weekIdx, dk);
    const enabled = !!date;
    const isHol = enabled && _tutugaIsHolidayWD(weekIdx, DAY_STR_TO_NUM[dk]);
    return { dk, date, enabled, isHol };
  });

  // ヘッダ（項目列 + 月〜金。月内列には日付・祝バッジ・個別 前日コピー/クリア ボタン）
  let headHtml = '<th>項目</th>';
  cols.forEach(c => {
    const holBadge = c.isHol ? `<span class="tutuga-holiday-badge">祝</span>` : "";
    const dateStr = c.date
      ? `<br><span style="font-size:10px;font-weight:normal;opacity:.7;">${c.date.getMonth() + 1}/${c.date.getDate()}${holBadge}</span>`
      : "";
    const dayActions = c.date
      ? `<div class="equip-day-actions"><button type="button" class="btn-equip-day-copy" data-day="${c.dk}" title="${dayLabels[c.dk]}曜日に前日コピー">前日コピー</button><button type="button" class="btn-equip-day-clear" data-day="${c.dk}" title="${dayLabels[c.dk]}曜日をクリア">クリア</button></div>`
      : "";
    headHtml += `<th class="col-${c.dk}${c.isHol ? ' col-holiday' : ''}">${dayLabels[c.dk]}${dateStr}${dayActions}</th>`;
  });

  // 本体（セクション見出し行 + 項目行 × 5曜日列）
  let bodyHtml = "";
  sections.forEach(sec => {
    // Phase 8 修正04B と同様: auto/autoCalc のみのセクションは見出しごと省略（機械は通常該当なし）
    const visibleFields = (sec.fields || []).filter(f => f.type !== 'auto' && f.type !== 'autoCalc');
    if (visibleFields.length === 0) return;
    bodyHtml += `<tr class="section-header"><td colspan="6">${escapeHtml(sec.title)}</td></tr>`;
    visibleFields.forEach(f => {
      const unit = f.unit ? `<span class="item-unit">${escapeHtml(f.unit)}</span>` : "";
      bodyHtml += `<tr><td><span class="item-label">${escapeHtml(f.label)}</span>${unit}</td>`;
      cols.forEach(c => {
        const tdCls = ((c.enabled ? "" : "day-disabled") + (c.isHol ? " cell-holiday" : "")).trim();
        const tdClsAttr = tdCls ? ` class="${tdCls}"` : "";
        const disabledAttr = c.enabled ? "" : " disabled";
        bodyHtml += `<td${tdClsAttr}>${buildMechCellHtml(f, c.dk, disabledAttr)}</td>`;
      });
      bodyHtml += `</tr>`;
    });
  });

  return `<div class="equip-table-wrap"><table class="equip-table" id="mechTable">`
       + `<thead><tr>${headHtml}</tr></thead><tbody>${bodyHtml}</tbody></table></div>`;
}

// 機械週グリッドの1セル（型別入力）。buildEquipFormHtml の型別ロジックと逐語一致させ、
// 数値テキストのバリデーション (data-elec-mech-numeric) とトグルの '-' 拡張を踏襲する。
function buildMechCellHtml(f, dayKey, disabledAttr) {
  const keyEsc = escapeHtml(f.key);
  if (f.type === "number") {
    return `<input type="text" inputmode="decimal" data-elec-mech-numeric="1" data-mfield="${keyEsc}" data-day="${dayKey}"${disabledAttr}>`;
  } else if (f.type === "text") {
    return `<input type="text" inputmode="${f.inputmode || 'decimal'}" data-mfield="${keyEsc}" data-day="${dayKey}"${disabledAttr}>`;
  } else if (f.type === "numdash") {
    return `<input type="text" inputmode="decimal" data-elec-mech-numeric="1" data-mfield="${keyEsc}" data-day="${dayKey}" placeholder="-"${disabledAttr}>`;
  } else if (f.type === "toggle") {
    const baseOpts = Array.isArray(f.options) ? f.options : [];
    const augmented = baseOpts.indexOf('-') >= 0 ? baseOpts : baseOpts.concat(['-']);
    const opts = JSON.stringify(augmented).replace(/"/g, '&quot;');
    return `<button type="button" class="toggle-btn" data-mfield="${keyEsc}" data-day="${dayKey}" data-options="${opts}"${disabledAttr}>―</button>`;
  }
  return `<span style="color:#999;">―</span>`;
}

// =====================================================
// フェーズ2 (2026-06-08): 電気設備 週グリッド HTML 生成
//   buildMechWeekGridHtml と同構造。差分2点:
//   (1) 行フィルタは type!=='auto' のみ（autoCalc=__使用量 は残して表示する）。
//       type:'auto'（返送/放流/燃料の積算読み転記）は現行単日どおり非表示。
//   (2) autoCalc セルは編集不可の表示セル（buildElecCellHtml）。
//       recomputeElecAutoCalc が data-autocalc-display 経由で値を書き込む。
// =====================================================
function buildElecWeekGridHtml(sub, weekIdx) {
  const sections = getElecSectionsForSub(sub);
  const dayLabels = { mon: "月", tue: "火", wed: "水", thu: "木", fri: "金" };

  const cols = EQUIP_DAYS.map(dk => {
    const date = getDateForDayKey(weekIdx, dk);
    const enabled = !!date;
    const isHol = enabled && _tutugaIsHolidayWD(weekIdx, DAY_STR_TO_NUM[dk]);
    return { dk, date, enabled, isHol };
  });

  // ヘッダ（機械グリッドと同一: 日付・祝バッジ・個別 前日コピー/クリア）
  let headHtml = '<th>項目</th>';
  cols.forEach(c => {
    const holBadge = c.isHol ? `<span class="tutuga-holiday-badge">祝</span>` : "";
    const dateStr = c.date
      ? `<br><span style="font-size:10px;font-weight:normal;opacity:.7;">${c.date.getMonth() + 1}/${c.date.getDate()}${holBadge}</span>`
      : "";
    const dayActions = c.date
      ? `<div class="equip-day-actions"><button type="button" class="btn-equip-day-copy" data-day="${c.dk}" title="${dayLabels[c.dk]}曜日に前日コピー">前日コピー</button><button type="button" class="btn-equip-day-clear" data-day="${c.dk}" title="${dayLabels[c.dk]}曜日をクリア">クリア</button></div>`
      : "";
    headHtml += `<th class="col-${c.dk}${c.isHol ? ' col-holiday' : ''}">${dayLabels[c.dk]}${dateStr}${dayActions}</th>`;
  });

  let bodyHtml = "";
  sections.forEach(sec => {
    // 追補① (2026-06-09): autoCalc(__使用量) の「表示」を消す（方式B）。
    //   使用量の行は data-autocalc-display セルを DOM に残したまま hidden-autocalc で非表示にする。
    //   → recomputeElecAutoCalc の表示書き戻し・計算/保存/Excel 経路は一切変えない（計算・保存は継続）。
    //   見える項目をフェーズ2以前の単日フォームと一致させるため、編集欄が無いセクション
    //   （type:'auto'/'autoCalc' しか持たない）は見出しごと省略する。
    const rows = (sec.fields || []).filter(f => f.type !== 'auto');   // 編集欄 + autoCalc(非表示で残す)
    const editable = rows.filter(f => f.type !== 'autoCalc');         // 編集欄のみ
    if (editable.length === 0) return;                               // 編集欄が無ければ見出しごと省略
    bodyHtml += `<tr class="section-header"><td colspan="6">${escapeHtml(sec.title)}</td></tr>`;
    rows.forEach(f => {
      const rowCls = (f.type === 'autoCalc') ? ' class="hidden-autocalc"' : '';  // 使用量行=非表示（セルは残置）
      const unit = f.unit ? `<span class="item-unit">${escapeHtml(f.unit)}</span>` : "";
      bodyHtml += `<tr${rowCls}><td><span class="item-label">${escapeHtml(f.label)}</span>${unit}</td>`;
      cols.forEach(c => {
        const tdCls = ((c.enabled ? "" : "day-disabled") + (c.isHol ? " cell-holiday" : "")).trim();
        const tdClsAttr = tdCls ? ` class="${tdCls}"` : "";
        const disabledAttr = c.enabled ? "" : " disabled";
        bodyHtml += `<td${tdClsAttr}>${buildElecCellHtml(f, c.dk, disabledAttr)}</td>`;
      });
      bodyHtml += `</tr>`;
    });
  });

  return `<div class="equip-table-wrap"><table class="equip-table" id="elecTable">`
       + `<thead><tr>${headHtml}</tr></thead><tbody>${bodyHtml}</tbody></table></div>`;
}

  } else if (f.type === "numdash") {
    return `<input type="text" inputmode="decimal" data-elec-mech-numeric="1" data-efield="${keyEsc}" data-day="${dayKey}" placeholder="-"${disabledAttr}>`;
  } else if (f.type === "toggle") {

    const augmented = baseOpts.indexOf('-') >= 0 ? baseOpts : baseOpts.concat(['-']);

    return `<button type="button" class="toggle-btn" data-efield="${keyEsc}" data-day="${dayKey}" data-options="${opts}"${disabledAttr}>―</button>`;

// Phase 8 修正03 追補: 以前は saveEquipFormToData / loadEquipDataToForm という
// 名前で定義されていたが、機器運転時間タブ用の同名関数（line 4305-4327）と

function saveMechElecFormToData(kind) {
  const fieldAttr = (kind === "mech") ? "mfield" : "efield";
  const week = (kind === "mech")
    ? tutugaData.mech[currentWeek]
    : tutugaData.elec[currentWeek];
  if (!week || !week.days) return;

  document.querySelectorAll(`[data-${fieldAttr}]`).forEach(el => {
    const key = el.dataset[fieldAttr];
    const day = el.dataset.day;
    if (!day || !week.days[day]) return;
    if (el.disabled) return;

    if (el.tagName === "INPUT") {
      const v = (el.value || "").trim();
      if (el.type === "text" && v === "-") {
        week.days[day][key] = "-";
      } else {
        week.days[day][key] = (v === "") ? null : v;
      }
    } else if (el.tagName === "BUTTON" && el.classList.contains("toggle-btn")) {
      week.days[day][key] = el.dataset.val || null;
    }
  });
}

// B-2 追加: 祝日振替ロジック
